<!DOCTYPE html>
<html lang="en">

<meta charset="UTF-8">
<title>Education</title>

<style>
body { font-family: Arial; margin:0; background:#eef2f3; }
header { background:#1f2d3d; color:white; padding:20px; text-align:center; }
nav { background:#2e86c1; padding:10px; text-align:center; }
nav a { color:white; margin:10px; text-decoration:none; }
.container { padding:30px; }

.tab { display:none; background:white; padding:20px; border-radius:8px; }

button { padding:10px; margin:5px; background:#2e86c1; color:white; border:none; }
</style>
</head>

<body>

<nav>

<div class="container">

<h2>Education</h2>

<button onclick="showTab('college')">College</button>
<button onclick="showTab('school')">School</button>

<div id="college" class="tab">
<h3>UCC</h3>
<p>Business Information Systems (2025–2029)</p>
</div>

<div id="school" class="tab">
<h3>Bruce College</h3>
<p>Leaving Cert: 501 Points</p>
</div>

</div>

<script>
function showTab(tabId) {
    let tabs = document.getElementsByClassName("tab");
    for (let i = 0; i < tabs.length; i++) {
        tabs[i].style.display = "none";
    }
    document.getElementById(tabId).style.display = "block";
}
</script>

</body>
